<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="author" content="Janis Angele">
  <meta name="creator" content="Janis Angele">
  <meta name="copyright" content="© 2026 Mark-Up BV">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velvet POS</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #161a23;
      --muted: #667085;
      --brand: #6b5cff;
      --ok: #2e7d32;
      --border: #e4e7ec;
      --shadow: 0 12px 28px rgba(15, 23, 42, .10);
      --radius: 18px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #eef1ff 0%, #f4f6fb 35%, #f4f6fb 100%);
      color: var(--text);
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .hidden { display: none !important; }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 16px; }

    .login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(16, 24, 40, .45);
      display: grid;
      place-items: center;
      z-index: 120;
      backdrop-filter: blur(4px);
    }

    .login-card {
      width: min(92vw, 440px);
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .topbar, .event-box, .panel, .grid-wrap {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, .8);
    }

    .topbar {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand h1 { margin: 0; font-size: clamp(2rem, 4vw, 2.8rem); letter-spacing: .2px; }
    .brand p { margin: 4px 0 0; color: var(--muted); font-size: .95rem; }

    .menu-area { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .icon-btn, .action-btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      background: #f2f4f7;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: inline-grid;
      place-items: center;
      font-size: 1.05rem;
      position: relative;
    }

    .icon-btn[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      top: 47px;
      right: 0;
      background: #111827;
      color: #fff;
      font-size: .72rem;
      white-space: nowrap;
      padding: 5px 8px;
      border-radius: 8px;
      z-index: 12;
    }

    .primary { background: var(--brand); color: #fff; }

    .settings-pop {
      position: absolute;
      right: 16px;
      top: 76px;
      width: min(88vw, 340px);
      padding: 12px;
      background: #fff;
      border-radius: 14px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      z-index: 30;
    }

    .field label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
    .field input, .field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 11px;
      font: inherit;
      background: #fff;
    }

    .event-box {
      margin-bottom: 12px;
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .grid-wrap { position: relative; padding: 14px; }
    .grid-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .pager { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .pager-info { font-size: .86rem; color: var(--muted); min-width: 64px; text-align: center; }

    .anders-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      border: 0;
      border-radius: 12px;
      background: #111;
      color: #fff;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      z-index: 4;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
      padding-top: 34px;
    }

    .drink-btn {
      border: 0;
      border-radius: 16px;
      min-height: 138px;
      padding: 12px;
      box-shadow: 0 6px 14px rgba(15, 23, 42, .12);
      cursor: pointer;
      text-align: left;
      position: relative;
      color: #0f172a;
    }

    .drink-title { font-size: 1.45rem; line-height: 1.15; font-weight: 700; }
    #formulaTitle { font-size: 1.35rem; }
    .drink-sub { font-size: .86rem; margin-top: 6px; opacity: .9; }
    .drink-meta {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 8px;
      display: flex;
      justify-content: space-between;
      font-size: .83rem;
      font-weight: 600;
    }

    .bottom { display: grid; grid-template-columns: 1.2fr .8fr; gap: 12px; margin-top: 14px; }
    .panel { padding: 14px; }
    .panel h2 { margin-top: 0; margin-bottom: 12px; }

    table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    th, td { padding: 8px 6px; border-bottom: 1px solid #eef2f6; text-align: left; }

    .summary-action { display: flex; gap: 8px; }
    .mini-btn { min-width: 34px; padding: 8px 10px; }

    .actions-panel {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }

    .confirm-btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      background: var(--ok);
      color: #fff;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }

    .small-totals {
      display: grid;
      gap: 8px;
      color: #334155;
      font-size: .9rem;
      background: #f8fafc;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    @media (max-width: 980px) {
      .event-box { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .bottom { grid-template-columns: 1fr; }
      .settings-pop { top: 66px; }
    }

    @media (max-width: 640px) {
      .wrap { padding: 10px; }
      .topbar { padding: 12px; align-items: flex-start; }
      .menu-area { width: 100%; justify-content: flex-start; }
      .event-box { grid-template-columns: 1fr; padding: 10px; }
      .grid-wrap { padding: 10px; }
      .grid { grid-template-columns: 1fr; }
      .drink-title { font-size: 1.28rem; }
      #formulaTitle { font-size: 1.15rem; }
    }
  </style>
</head>
<body>
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <h2 style="margin:0 0 10px;">Login Velvet POS</h2>
      <div class="field">
        <label for="loginPin">PIN</label>
        <input id="loginPin" type="password" placeholder="Voer PIN in" />
      </div>
      <p style="color: var(--muted); font-size: .85rem;">Standaard PIN: <b>Velvet2026</b>.</p>
      <button class="action-btn primary" id="loginBtn" style="width:100%;">Inloggen</button>
    </div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>Velvet</h1>
        <p>Modern en responsive kassascherm voor mobiel, tablet en desktop.</p>
      </div>

      <div class="menu-area">
        <button class="icon-btn" id="saveBtn" data-tip="Save" aria-label="Save">💾</button>
        <button class="icon-btn" id="exportBtn" data-tip="Exporteer" aria-label="Exporteer">📤</button>
        <button class="icon-btn" id="resetBtn" data-tip="Reset" aria-label="Reset">↩️</button>
        <button class="icon-btn" id="restoreBtn" data-tip="Backup" aria-label="Backup">🗄️</button>
        <button class="icon-btn" id="settingsToggle" data-tip="Instellingen" aria-label="Instellingen">⚙️</button>
        <button class="icon-btn" id="accountBtn" data-tip="Account" aria-label="Account">👤</button>
      </div>

      <div class="settings-pop hidden" id="settingsMenu">
        <div class="field">
          <label for="sheetEndpoint">Google Apps Script URL</label>
          <input id="sheetEndpoint" placeholder="https://script.google.com/..." />
        </div>
        <button class="action-btn" id="logoutBtn" style="margin-top:8px; width: 100%;">Logout</button>
      </div>
    </div>

    <div class="event-box">
      <div class="field"><label for="eventName">Event</label><input id="eventName" placeholder="Naam event"></div>
      <div class="field"><label for="eventDate">Datum</label><input id="eventDate" type="date"></div>
      <div class="field"><label for="formulaSelect">Formule</label>
        <select id="formulaSelect">
          <option value="volledige lijst">Volledige lijst</option>
          <option value="light">Light</option>
          <option value="lux">Lux</option>
          <option value="gold">Gold</option>
          <option value="diamond">Diamond</option>
        </select>
      </div>
      <div class="field"><label for="stationId">ID</label>
        <select id="stationId">
          <option>Bar voor 1</option>
          <option>Bar achter 1</option>
          <option>Bar achter 2</option>
          <option>Zaal 1</option>
          <option>Zaal 2</option>
        </select>
      </div>
      <div class="field"><label for="staffName">Naam medewerker</label><input id="staffName" placeholder="bv. Bob"></div>
    </div>

    <div class="grid-wrap">
      <button class="anders-btn" id="andersBtn">+ Nieuw artikel</button>
      <div class="grid-head">
        <strong id="formulaTitle">Volledige lijst</strong>
        <div class="pager">
          <button class="action-btn" id="prevPageBtn">◀</button>
          <span class="pager-info" id="pageInfo">1 / 1</span>
          <button class="action-btn" id="nextPageBtn">▶</button>
        </div>
      </div>
      <div class="grid" id="drinkGrid"></div>
    </div>

    <div class="bottom">
      <div class="panel">
        <h2>Overzicht</h2>
        <table>
          <thead><tr><th>Drank</th><th>Aantal</th><th>Stock na</th><th>€</th><th>Actie</th></tr></thead>
          <tbody id="summaryBody"></tbody>
        </table>
      </div>
      <div class="panel actions-panel">
        <div style="text-align:right; font-weight:700;">Totaal: <span id="confirmCycleTotal">€ 0,00</span></div>
        <div>
          <button class="confirm-btn" id="confirmBtn">Bevestig</button>
        </div>
        <div class="small-totals">
          <div style="display:flex; justify-content:space-between; gap:8px;">
            <span><strong>Omzet event:</strong> <span id="eventRevenue">€ 0,00</span></span>
            <span><strong>Dranken event:</strong> <span id="eventCount">0</span></span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const STORAGE_KEY = 'velvet-pos-v2';
    const ARCHIVE_KEY = 'velvet-pos-archive-v2';
    const BACKUP_KEY = 'velvet-pos-backup-v2';
    const LOGIN_PIN = 'Velvet2026';
    const PAGE_SIZE = 12;

    const categoryColors = {
      'Frisdranken': '#d9f99d',
      'Bieren': '#fde68a',
      'Wijnen': '#fef08a',
      'Cocktails': '#ddd6fe',
      'Sterke dranken': '#fecdd3',
      'Anders': '#e2e8f0'
    };

    const defaultDrinks = [
      { id: 'cola', name: 'Cola', category: 'Frisdranken', color: '#8bc34a', stock: 24, count: 0, price: 2.8, formulas: ['volledige lijst','light','lux','gold','diamond'], type: 'fris', exactBrand: true, stockPool: 'cola' },
      { id: 'cola_zero', name: 'Cola Zero', category: 'Frisdranken', color: '#7cb342', stock: 24, count: 0, price: 2.8, formulas: ['volledige lijst','light','lux','gold','diamond'], type: 'fris', exactBrand: true, stockPool: 'cola_zero' },
      { id: 'tonic', name: 'Tonic', category: 'Frisdranken', color: '#aed581', stock: 18, count: 0, price: 2.8, formulas: ['volledige lijst','lux','gold','diamond'], type: 'fris', exactBrand: false, stockPool: 'mix_fris' },
      { id: 'ginger_ale', name: 'Ginger Ale', category: 'Frisdranken', color: '#c5e1a5', stock: 18, count: 0, price: 2.8, formulas: ['volledige lijst','lux','gold','diamond'], type: 'fris', exactBrand: false, stockPool: 'mix_fris' },
      { id: 'pils', name: 'Pils', category: 'Bieren', color: '#ffeb3b', stock: 48, count: 0, price: 3.2, formulas: ['volledige lijst','light','lux','gold','diamond'], type: 'bier', exactBrand: true, stockPool: 'pils' },
      { id: 'ipa', name: 'IPA', category: 'Bieren', color: '#fdd835', stock: 24, count: 0, price: 3.8, formulas: ['volledige lijst','gold','diamond'], type: 'bier', exactBrand: true, stockPool: 'ipa' },
      { id: 'wit', name: 'Huiswijn wit', category: 'Wijnen', color: '#f9c2d1', stock: 30, count: 0, price: 4.4, formulas: ['volledige lijst','light','lux','gold','diamond'], type: 'wijn', exactBrand: true, stockPool: 'wijn_wit' },
      { id: 'rood', name: 'Huiswijn rood', category: 'Wijnen', color: '#f7a8bb', stock: 30, count: 0, price: 4.4, formulas: ['volledige lijst','light','lux','gold','diamond'], type: 'wijn', exactBrand: true, stockPool: 'wijn_rood' },
      { id: 'gin_tonic', name: 'Gin Tonic', category: 'Cocktails', color: '#c4b5fd', stock: 40, count: 0, price: 9.5, formulas: ['volledige lijst','gold','diamond'], type: 'cocktail', exactBrand: false, stockPool: 'cocktail' },
      { id: 'mojito', name: 'Mojito', category: 'Cocktails', color: '#a78bfa', stock: 35, count: 0, price: 10, formulas: ['volledige lijst','diamond'], type: 'cocktail', exactBrand: false, stockPool: 'cocktail' },
      { id: 'vodka', name: 'Vodka', category: 'Sterke dranken', color: '#ef9a9a', stock: 20, count: 0, price: 7, formulas: ['volledige lijst','lux','gold','diamond'], type: 'sterk', exactBrand: true, stockPool: 'vodka' },
      { id: 'whisky', name: 'Whisky', category: 'Sterke dranken', color: '#e57373', stock: 20, count: 0, price: 8.2, formulas: ['volledige lijst','gold','diamond'], type: 'sterk', exactBrand: true, stockPool: 'whisky' },
      { id: 'anders', name: 'Anders', category: 'Anders', color: '#d1c4e9', stock: 9999, count: 0, price: 0, formulas: ['volledige lijst','light','lux','gold','diamond'], type: 'custom', exactBrand: true, stockPool: 'anders' }
    ];

    const recipes = {
      gin_tonic: [{ ingredientPool: 'vodka', qty: 0.05 }, { ingredientPool: 'mix_fris', qty: 1 }],
      mojito: [{ ingredientPool: 'cocktail', qty: 1 }]
    };

    let state = loadState();
    let currentPage = 0;
    let pendingConfirmValue = 0;

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { drinks: structuredClone(defaultDrinks), actionHistory: [], sessionActions: [] };
      try {
        const parsed = JSON.parse(raw);
        return {
          drinks: Array.isArray(parsed.drinks) ? parsed.drinks : structuredClone(defaultDrinks),
          actionHistory: Array.isArray(parsed.actionHistory) ? parsed.actionHistory : [],
          sessionActions: Array.isArray(parsed.sessionActions) ? parsed.sessionActions : []
        };
      } catch {
        return { drinks: structuredClone(defaultDrinks), actionHistory: [], sessionActions: [] };
      }
    }

    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function todayIso() {
      const d = new Date();
      const tzOffset = d.getTimezoneOffset() * 60000;
      return new Date(d.getTime() - tzOffset).toISOString().slice(0, 10);
    }

    function getFilteredDrinks() {
      const formula = document.getElementById('formulaSelect').value;
      return state.drinks.filter(d => d.id !== 'anders' && d.formulas.includes(formula));
    }

    function getPagedDrinks() {
      const drinks = getFilteredDrinks();
      const pages = Math.max(1, Math.ceil(drinks.length / PAGE_SIZE));
      if (currentPage >= pages) currentPage = pages - 1;
      const start = currentPage * PAGE_SIZE;
      const end = start + PAGE_SIZE;
      return { drinks: drinks.slice(start, end), pages };
    }

    function decrementPool(drink) {
      if (drink.exactBrand) return;
      const samePool = state.drinks.filter(d => d.stockPool === drink.stockPool && d.id !== drink.id);
      const target = samePool.find(d => (d.stock - d.count) > 0);
      if (target) target.count += 1;
    }

    function applyRecipe(drink) {
      const recipe = recipes[drink.id];
      if (!recipe) return;
      recipe.forEach(item => {
        const ingredient = state.drinks.find(d => d.stockPool === item.ingredientPool);
        if (ingredient) ingredient.count += item.qty;
      });
    }

    function incrementDrink(drinkId) {
      const drink = state.drinks.find(d => d.id === drinkId);
      if (!drink) return;
      state.actionHistory.push({ drinkId, at: Date.now() });
      state.sessionActions.push({ drinkId, at: Date.now() });
      drink.count += 1;
      decrementPool(drink);
      applyRecipe(drink);
      pendingConfirmValue += drink.price;
      saveState();
      renderAll();
    }

    function decrementDrink(drinkId) {
      const drink = state.drinks.find(d => d.id === drinkId);
      if (!drink) return;
      if (drink.count > 0) {
        drink.count -= 1;
        pendingConfirmValue = Math.max(0, pendingConfirmValue - drink.price);
      }
      saveState();
      renderAll();
    }

    function renderGrid() {
      const grid = document.getElementById('drinkGrid');
      grid.innerHTML = '';
      const paged = getPagedDrinks();
      paged.drinks.forEach(drink => {
        const stockAfter = Math.max(0, drink.stock - drink.count);
        const btn = document.createElement('button');
        btn.className = 'drink-btn';
        btn.style.background = drink.color || categoryColors[drink.category] || '#e2e8f0';
        btn.innerHTML = `
          <div class="drink-title">${drink.name}</div>
          <div class="drink-sub">€ ${drink.price.toFixed(2)} • ${drink.category}</div>
          <div class="drink-meta"><span>x ${Math.floor(drink.count)}</span><span>stock: ${Math.floor(stockAfter)}</span></div>
        `;
        btn.addEventListener('click', () => incrementDrink(drink.id));
        grid.appendChild(btn);
      });

      document.getElementById('pageInfo').textContent = `${currentPage + 1} / ${paged.pages}`;
      document.getElementById('prevPageBtn').disabled = currentPage <= 0;
      document.getElementById('nextPageBtn').disabled = currentPage >= (paged.pages - 1);
    }

    function renderSummary() {
      const body = document.getElementById('summaryBody');
      body.innerHTML = '';
      state.drinks.filter(d => d.count > 0).forEach(d => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${d.name}</td>
          <td>${Math.floor(d.count)}</td>
          <td>${Math.floor(Math.max(0, d.stock - d.count))}</td>
          <td>€ ${(d.count * d.price).toFixed(2)}</td>
          <td>
            <div class="summary-action">
              <button class="action-btn mini-btn" data-a="minus">-</button>
              <button class="action-btn mini-btn" data-a="plus">+</button>
            </div>
          </td>
        `;
        tr.querySelector('[data-a="minus"]').addEventListener('click', () => decrementDrink(d.id));
        tr.querySelector('[data-a="plus"]').addEventListener('click', () => incrementDrink(d.id));
        body.appendChild(tr);
      });
      if (!body.children.length) body.innerHTML = '<tr><td colspan="5">Nog geen registraties.</td></tr>';
    }

    function renderTotals() {
      const eventRevenue = state.drinks.reduce((sum, d) => sum + d.count * d.price, 0);
      const eventCount = state.drinks.reduce((sum, d) => sum + d.count, 0);

      document.getElementById('confirmCycleTotal').textContent = `€ ${pendingConfirmValue.toFixed(2).replace('.', ',')}`;
      document.getElementById('eventRevenue').textContent = `€ ${eventRevenue.toFixed(2).replace('.', ',')}`;
      document.getElementById('eventCount').textContent = `${Math.floor(eventCount)}`;
    }

    function renderFormulaTitle() {
      const formula = document.getElementById('formulaSelect').value;
      document.getElementById('formulaTitle').textContent = formula.charAt(0).toUpperCase() + formula.slice(1);
    }

    function renderAll() {
      renderFormulaTitle();
      renderGrid();
      renderSummary();
      renderTotals();
    }

    function addAndersFromInput() {
      const name = prompt('Naam drank (nieuw of bestaand):', '');
      if (!name) return;
      const priceInput = prompt('Prijs van deze drank?', '0');
      const price = Number.parseFloat((priceInput || '0').replace(',', '.')) || 0;
      const id = `custom_${Date.now()}`;
      const formula = document.getElementById('formulaSelect').value;
      const newDrink = {
        id,
        name,
        category: 'Anders',
        color: '#111111',
        stock: 9999,
        count: 1,
        price,
        formulas: ['volledige lijst','light','lux','gold','diamond'].includes(formula) ? [formula, 'volledige lijst'] : ['volledige lijst'],
        type: 'custom',
        exactBrand: true,
        stockPool: id
      };
      state.drinks.push(newDrink);
      state.actionHistory.push({ drinkId: id, at: Date.now() });
      state.sessionActions.push({ drinkId: id, at: Date.now() });
      pendingConfirmValue += newDrink.price;
      saveState();
      renderAll();
    }

    function undoLast() {
      const last = state.actionHistory.pop();
      if (!last) return alert('Geen acties om te undo-en.');
      decrementDrink(last.drinkId);
      saveState();
      renderAll();
    }

    function undoSession() {
      if (!state.sessionActions.length) return alert('Geen sessie-acties om terug te draaien.');
      const grouped = state.sessionActions.reduce((acc, row) => {
        acc[row.drinkId] = (acc[row.drinkId] || 0) + 1;
        return acc;
      }, {});
      Object.entries(grouped).forEach(([drinkId, n]) => {
        const drink = state.drinks.find(d => d.id === drinkId);
        if (!drink) return;
        const reduceBy = Math.min(drink.count, n);
        drink.count -= reduceBy;
        pendingConfirmValue = Math.max(0, pendingConfirmValue - (reduceBy * drink.price));
      });
      state.sessionActions = [];
      saveState();
      renderAll();
    }

    function backupCurrentState() {
      localStorage.setItem(BACKUP_KEY, JSON.stringify({ at: new Date().toISOString(), drinks: state.drinks }));
    }

    function resetCounts() {
      const txt = prompt('Typ RESET om te bevestigen.');
      if (txt !== 'RESET') return alert('Reset geannuleerd.');
      backupCurrentState();
      state.drinks = state.drinks.map(d => ({ ...d, count: 0 }));
      state.sessionActions = [];
      state.actionHistory = [];
      pendingConfirmValue = 0;
      saveState();
      renderAll();
    }

    function restoreBackup() {
      const raw = localStorage.getItem(BACKUP_KEY);
      if (!raw) return alert('Geen backup gevonden.');
      try {
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed.drinks)) throw new Error('bad');
        state.drinks = parsed.drinks;
        saveState();
        renderAll();
        alert('Backup hersteld.');
      } catch {
        alert('Backup kon niet gelezen worden.');
      }
    }

    function buildRowsForExport() {
      const eventName = document.getElementById('eventName').value.trim() || 'Onbenoemd event';
      const eventDate = document.getElementById('eventDate').value || todayIso();
      const stationId = document.getElementById('stationId').value;
      const staffName = document.getElementById('staffName').value.trim() || 'Onbekend';
      const formula = document.getElementById('formulaSelect').value;
      return state.drinks.filter(d => d.count > 0).map(d => ({
        eventName,
        eventDate,
        stationId,
        staffName,
        formula,
        drink: d.name,
        type: d.type,
        amount: Math.floor(d.count),
        stockAfter: Math.floor(Math.max(0, d.stock - d.count)),
        price: d.price,
        total: +(d.price * d.count).toFixed(2)
      }));
    }

    function csvSafe(value) {
      const str = String(value ?? '');
      if (str.includes(';') || str.includes('"') || str.includes('\n')) return '"' + str.replaceAll('"', '""') + '"';
      return str;
    }

    function exportCsv() {
      const rows = buildRowsForExport();
      const header = ['event', 'datum', 'id', 'naam medewerker', 'formule', 'drank', 'type', 'aantal', 'stock_na', 'prijs', 'totaal'];
      const lines = [header.join(';')].concat(rows.map(r => [r.eventName, r.eventDate, r.stationId, r.staffName, r.formula, r.drink, r.type, r.amount, r.stockAfter, r.price, r.total].map(csvSafe).join(';')));
      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `velvet-export-${todayIso()}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function saveEventSnapshot() {
      const rows = buildRowsForExport();
      const archive = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]');
      archive.push({ savedAt: new Date().toISOString(), rows });
      localStorage.setItem(ARCHIVE_KEY, JSON.stringify(archive));

      const endpoint = document.getElementById('sheetEndpoint').value.trim();
      if (endpoint) {
        try {
          await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ source: 'velvet-pos', rows })
          });
          alert('Lokaal bewaard + doorgestuurd naar Google Apps Script.');
        } catch {
          alert('Lokaal bewaard, maar Google sync faalde.');
        }
      } else {
        alert('Lokaal bewaard. Voeg Google Apps Script URL toe bij instellingen.');
      }
    }

    function confirmOrder() {
      if (pendingConfirmValue <= 0) return alert('Nog geen nieuwe dranken om te bevestigen.');
      alert(`Bevestigd: € ${pendingConfirmValue.toFixed(2).replace('.', ',')}`);
      pendingConfirmValue = 0;
      state.sessionActions = [];
      saveState();
      renderAll();
    }

    function toggleSettingsMenu() {
      document.getElementById('settingsMenu').classList.toggle('hidden');
    }

    function goPrevPage() {
      currentPage = Math.max(0, currentPage - 1);
      renderGrid();
    }

    function goNextPage() {
      const totalPages = Math.max(1, Math.ceil(getFilteredDrinks().length / PAGE_SIZE));
      currentPage = Math.min(totalPages - 1, currentPage + 1);
      renderGrid();
    }

    function logout() {
      document.getElementById('loginOverlay').classList.remove('hidden');
      document.getElementById('settingsMenu').classList.add('hidden');
      document.getElementById('loginPin').value = '';
    }

    function handleLogin() {
      const pin = document.getElementById('loginPin').value;
      if (pin !== LOGIN_PIN) return alert('Foute PIN.');
      document.getElementById('loginOverlay').classList.add('hidden');
    }

    document.getElementById('formulaSelect').addEventListener('change', () => {
      currentPage = 0;
      renderAll();
    });

    document.getElementById('saveBtn').addEventListener('click', saveEventSnapshot);
    document.getElementById('exportBtn').addEventListener('click', exportCsv);
    document.getElementById('resetBtn').addEventListener('click', resetCounts);
    document.getElementById('restoreBtn').addEventListener('click', restoreBackup);
    document.getElementById('andersBtn').addEventListener('click', addAndersFromInput);
    document.getElementById('confirmBtn').addEventListener('click', confirmOrder);
    document.getElementById('settingsToggle').addEventListener('click', toggleSettingsMenu);
    document.getElementById('prevPageBtn').addEventListener('click', goPrevPage);
    document.getElementById('nextPageBtn').addEventListener('click', goNextPage);
    document.getElementById('accountBtn').addEventListener('click', logout);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('loginBtn').addEventListener('click', handleLogin);

    document.addEventListener('click', (ev) => {
      const menu = document.getElementById('settingsMenu');
      const toggle = document.getElementById('settingsToggle');
      if (!menu.contains(ev.target) && ev.target !== toggle) menu.classList.add('hidden');
    });

    document.getElementById('eventDate').value = todayIso();
    renderAll();
  </script>
</body>
</html>
